name: Sync to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Track large files with LFS
        run: |
          git lfs install
          git lfs track "chroma_db/chroma.sqlite3"
          git lfs track "*.bin"

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://paulopestana:$HF_TOKEN@huggingface.co/spaces/paulopestana/admitad-docs-assistant
          git push hf main --force