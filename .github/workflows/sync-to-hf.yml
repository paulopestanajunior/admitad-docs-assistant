name: Sync to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          # Remove chroma_db from tracking (HF already has it)
          git rm -r --cached chroma_db/ || true
          echo "chroma_db/" >> .gitignore
          git add .gitignore
          git commit -m "ci: exclude chroma_db from sync" || true

          # Push to HuggingFace
          git remote add hf https://paulopestana:$HF_TOKEN@huggingface.co/spaces/paulopestana/admitad-docs-assistant
          git push hf main --force