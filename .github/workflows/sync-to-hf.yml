name: Sync to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Push to HuggingFace (without chroma_db)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Create a fresh branch with no history (avoids LFS issues from old commits)
          git checkout --orphan hf-deploy
          
          # Remove chroma_db from this deploy (HF already has it)
          rm -rf chroma_db/
          echo "chroma_db/" >> .gitignore
          
          # Commit everything clean
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "deploy: sync from GitHub"
          
          # Force push to HuggingFace
          git remote add hf https://paulopestana:$HF_TOKEN@huggingface.co/spaces/paulopestana/admitad-docs-assistant
          git push hf hf-deploy:main --force